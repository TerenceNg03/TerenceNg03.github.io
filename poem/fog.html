	<h1 class="poem_title">霧</h1>

	<p class="poem_content">
		<br>安靜的在眼前<br>一切睡下<br>這白色充滿身邊<br>未見過時間<br>卻突然停住了<br>未見過遠方<br>卻突然失蹤了<br><br>三點八公尺以外<br>靜靜等待<br>什麼會生於空白<br>從無中生有<br>分解出繽紛色彩<br>這一刻不要緊<br>分不清慢與快<br>仍可感知到暗流<br>仿似下一秒突然現身最愛<br>畢竟誰人能講明<br>枯枝怎不會花開<br><br>前行兩步便失去方向<br>懷疑本不該向前<br>未見過月亮<br>怎可講今晚能共賞<br>夢里看過的牆<br>是否已經悄然關上<br>最後的道口<br>或者這大霧裡也閃爍過霓虹<br>卻無緣沾濕衣裳<br><br>不過也許這裡<br>僅剩的也只是沈寂<br><br><br><br>
	</p>
