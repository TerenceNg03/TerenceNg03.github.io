	<h1 class="poem_title">靜默的雨</h1>

	<p class="poem_content">
		<br>深青色的石板上積著水<br>水中映照出松樹的樹枝<br>樹旁潮濕的鐵軌<br>列車還沒有駛來<br>被雨水打濕的落葉<br>夾在枕木和碎石的縫隙里<br>井蓋上濕滑的苔蘚<br>反射的暗綠色的光<br>滑落到湖水里<br>被雨點悄悄打碎<br>混合進樹梢和天空之間<br>又好像未曾發生過<br><br><br>
	</p>
